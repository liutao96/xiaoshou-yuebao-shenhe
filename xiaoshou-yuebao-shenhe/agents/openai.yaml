interface:
  display_name: "销售月报审核"
  short_description: "读取飞书或上传月报，完成14模块深审、评分分流、Word正式报告、Markdown底稿和整改指令。"
  default_prompt: "使用 $xiaoshou-yuebao-shenhe 审核这个飞书月报链接；公司文档默认使用 company-liutao-default，不要自动使用个人或外包 profile；正式初审的聊天回复必须给部长首屏可读的14模块速览，不能只给简单结论和报告路径；费用、退款、净成交额、毛利、库存、复购和品相未提供时不要单独扣分或打回，口径能用一句备注说明时不要要求业务补表；完整报告默认同时生成Word正式版和Markdown底稿；如果用户说这是修改后或整改后的月报，请直接做复核，先自动查找上次初审内容，找不到再让用户补充上次初审报告；最后给一段只包含本次实际问题的整改指令。"
