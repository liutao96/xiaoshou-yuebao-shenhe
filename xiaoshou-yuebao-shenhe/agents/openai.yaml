interface:
  display_name: "销售月报审核"
  short_description: "读取飞书或上传月报，完成14模块深审、评分分流、部长版留档报告和整改指令。"
  default_prompt: "使用 $xiaoshou-yuebao-shenhe 审核这个飞书月报链接；如果环境未配置，请先自检、安装并发起授权；正式初审的聊天回复必须给部长首屏可读的14模块速览，不能只给简单结论和报告路径；如果用户说这是修改后或整改后的月报，请直接做复核，先自动查找上次初审内容，找不到再让用户补充；同时生成部长版14模块留档报告，说明报告生成逻辑，并在最后给一段可直接转发给部门整改的文字。"
